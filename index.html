<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <section id="login" class="min-h-screen flex items-center">
      <div
        class="w-auto md:w-[520px] mx-auto p-8 flex flex-col items-center rounded-lg shadow-2xl"
      >
        <img src="./assets/github-logo.png" alt="" class="w-[100px] mb-6" />
        <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
        <fieldset
          class="fieldset rounded-box w-full"
        >
        
          <label class="label font-medium text-black text-[16px]">Username</label>
          <input type="text" id="user-name" class="input w-full" placeholder="Enter Username" />
          <p class="text-[#4A00FF] text-[14px]">Default: admin</p>

          <label class="label font-medium text-black text-[16px]">Password</label>
          <input type="password" id="pass" class="input w-full" placeholder="Enter Password" />
          <p class="text-[#4A00FF] text-[14px]">Default: admin123</p>

          <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
        <div class="mt-5 w-full text-center flex items-center gap-3">
          <hr class="text-[#E4E4E7] w-full">
          <p>OR</p>
          <hr class="text-[#E4E4E7] w-full">
        </div>
        <p class="text-[#64748B] text-[14px] mt-4">Demo Credentials:</p>
        <div class="mb-8 bg-[#F8FAFC] w-full flex flex-col items-center py-8 mt-2 rounded-lg">
          <h4 class="font-bold">Username: <span class="font-normal">admin</span></h4>
          <h4 class="font-bold">Password: <span class="font-normal">admin123</span></h4>

        </div>
      </div>
      
    </section>

  
    <script src="script/sign.js"></script>
  </body>
</html>
