<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <nav class="sticky top-0">
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <div class="flex gap-2 items-center">
            <img src="./assets/github-logo.png" alt="" class="w-6 h-6" />
            <h4 class="text-2xl font-semibold">GitHub Issues Tracker</h4>
          </div>
        </div>

        <div class="hidden sm:flex gap-2 items-center">
          <div class="relative">
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"
            ></i>

            <input
              id="search-issue"
              type="text"
              placeholder="Search issues..."
              class=" w-full border-gray-200 rounded-md py-2 pl-9 pr-3 text-sm "
            />
          </div>

          <button id="search-btn" class=" btn btn-primary whitespace-nowrap ">+ New Issue</button>
        </div>

        <div class="flex sm:hidden">
          <div class="dropdown dropdown-end">
            <label tabindex="0" class="btn">
              <i class="fa fa-bars"></i>
            </label>
            <ul class="dropdown-content menu p-2 bg-base-100 rounded-box w-45">
              <li>
                <div class="relative">
                  <i
                    class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"
                  ></i>

                  <input
                  id="search-issue-small"
                    type="text"
                    placeholder="Search issues..."
                    class="search-issue w-full border-gray-200 rounded-md py-2 pl-9 pr-3 text-sm "
                  />
                </div>
              </li>
              <li>
                <button id="search-btn-small" class="search-btn btn btn-primary ">+ New Issue</button>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <section
      id=""
      class="bg-white w-10/12 mx-auto flex justify-between flex-wrap items-center md:justify-start gap-3 mt-[60px] p-4 rounded-lg shadow"
    >
      <button id="all-btn" class="btn btn-primary w-[120px]">All</button>
      <button id="open-btn" class="btn w-[120px]">Open</button>
      <button id="closed-btn" class="btn w-[120px]">Closed</button>
    </section>

    <section
      class="bg-white w-10/12 mx-auto mt-2.5 mb-0.5 p-4 rounded-t-lg shadow"
    >
      <div class="md:flex justify-between">
        <div class="flex flex-wrap gap-1">
          <img src="./assets/Aperture.png" alt="" class="w-[50px] h-[50px]" />
          <div>
            <div id="count-cards">
              <h3 class="text-[20px] font-bold">0 Issues</h3>
            </div>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex flex-wrap gap-2">
          <div class="flex gap-1 items-center">
            <i class="fa-solid fa-circle text-green-500"></i>
            <h4 class="font-bold">Open</h4>
          </div>
          <div class="flex gap-1 items-center">
            <i class="fa-solid fa-circle text-[#A855F7]"></i>
            <h4 class="font-bold">Closed</h4>
          </div>
        </div>
      </div>
    </section>

      class="w-10/12 mx-auto bg-[#FBFBFB] shadow p-[25px] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 justify-center"
